<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Version Checker | PixelHide.net</title>

<meta property="og:title" content="PixelHide.net">
<meta property="og:description" content="Version Support Checker">
<meta property="og:image" content="https://pixelhide.net/favicon.png">

<link rel="icon" href="https://pixelhide.net/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#040406;
  --card:#0d0d14;
  --card2:#13131d;

  --accent:#a78bfa;
  --accent2:#c4b5fd;

  --text:#f5f5f5;
  --muted:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow-x:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#08080d;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--accent),var(--accent2));
  border-radius:999px;
}

/* GLOW */

.bg-glow{
  position:fixed;
  width:700px;
  height:700px;
  background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
  opacity:.12;
  filter:blur(100px);
  z-index:-1;
  animation:floatGlow 12s ease-in-out infinite;
}

.bg-glow2{
  right:-250px;
  top:350px;
  animation-delay:4s;
}

@keyframes floatGlow{
  0%{
    transform:translateY(0px) translateX(0px);
  }

  50%{
    transform:translateY(-50px) translateX(40px);
  }

  100%{
    transform:translateY(0px) translateX(0px);
  }
}

/* HERO */

.hero{
  position:relative;
  min-height:100vh;

  background:
  linear-gradient(rgba(0,0,0,.45),rgba(4,4,6,.96)),
  url("Banner.png") center/cover no-repeat;

  display:flex;
  justify-content:center;
  align-items:center;

  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;

  background:
  radial-gradient(circle at center,
  rgba(167,139,250,.2),
  transparent 60%);

  animation:pulse 6s infinite;
}

@keyframes pulse{
  0%{
    opacity:.4;
    transform:scale(1);
  }

  50%{
    opacity:.8;
    transform:scale(1.08);
  }

  100%{
    opacity:.4;
    transform:scale(1);
  }
}

.hero-content{
  position:relative;
  z-index:2;

  width:100%;
  max-width:900px;

  text-align:center;
  padding:30px;

  animation:heroEnter 1.1s ease;
}

@keyframes heroEnter{
  from{
    opacity:0;
    transform:translateY(40px);
  }

  to{
    opacity:1;
    transform:translateY(0px);
  }
}

.logo{
  width:520px;
  max-width:95%;

  margin-bottom:30px;

  filter:
    drop-shadow(0 0 20px rgba(167,139,250,.6))
    drop-shadow(0 0 80px rgba(167,139,250,.5));

  animation:floatLogo 5s ease-in-out infinite;
}

@keyframes floatLogo{
  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-10px);
  }

  100%{
    transform:translateY(0px);
  }
}

.hero-title{
  font-size:3.6rem;
  font-family:Orbitron;
  margin-bottom:18px;
}

.hero-text{
  color:var(--muted);
  max-width:700px;
  margin:auto;

  line-height:1.8;
  font-size:1.08rem;
}

/* STATUS */

.status{
  margin-top:45px;

  display:flex;
  justify-content:center;
  align-items:center;
  gap:18px;

  flex-wrap:wrap;
}

.ip-box{
  background:
  linear-gradient(
    145deg,
    rgba(255,255,255,.05),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.07);

  border-radius:22px;

  padding:22px 30px;

  min-width:280px;

  text-align:center;

  backdrop-filter:blur(10px);
}

.ip{
  font-size:2rem;
  font-weight:800;
  color:var(--accent2);

  margin-bottom:8px;
}

.ip-small{
  color:var(--muted);
}

/* BUTTON */

.btn{
  position:relative;

  padding:17px 34px;
  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;

  overflow:hidden;

  text-decoration:none;
  font-weight:700;

  transition:.25s;

  backdrop-filter:blur(10px);

  border:none;
  cursor:pointer;
}

.btn::before{
  content:"";

  position:absolute;
  top:0;
  left:-120%;

  width:100%;
  height:100%;

  background:
  linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.22),
    transparent
  );

  transition:.6s;
}

.btn:hover::before{
  left:120%;
}

.btn:hover{
  transform:translateY(-4px) scale(1.03);
}

.btn-primary{
  background:
  linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:#050507;

  box-shadow:
    0 0 25px rgba(167,139,250,.25),
    0 0 70px rgba(167,139,250,.15);
}

/* VERSION CARD */

.version-wrapper{
  margin-top:50px;

  display:flex;
  justify-content:center;
}

.version-card{
  width:100%;
  max-width:420px;

  background:
  linear-gradient(
    145deg,
    rgba(255,255,255,.05),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.07);

  border-radius:28px;

  padding:28px;

  backdrop-filter:blur(12px);

  box-shadow:
    0 0 40px rgba(167,139,250,.08);
}

/* CUSTOM DROPDOWN */

.custom-select{
  position:relative;
  width:100%;
}

.select-trigger{
  position:relative;

  width:100%;

  padding:16px 20px;

  background:rgba(255,255,255,.04);

  border:1px solid rgba(255,255,255,.08);

  border-radius:18px;

  display:flex;
  align-items:center;
  justify-content:space-between;

  cursor:pointer;

  transition:.25s;

  overflow:hidden;
}

.select-trigger:hover{
  border-color:rgba(167,139,250,.45);
}

.select-trigger.active{
  border-color:rgba(167,139,250,.55);

  box-shadow:
    0 0 25px rgba(167,139,250,.12);
}

.arrow{
  transition:.3s;
}

.select-trigger.active .arrow{
  transform:rotate(180deg);
}

.options{
  position:absolute;

  top:calc(100% + 10px);
  left:0;

  width:100%;

  background:rgba(12,12,18,.96);

  border:1px solid rgba(255,255,255,.08);

  border-radius:20px;

  overflow:hidden;

  opacity:0;
  visibility:hidden;

  transform:translateY(-10px) scale(.96);

  transition:.25s;

  backdrop-filter:blur(18px);

  z-index:999;

  max-height:220px;
  overflow-y:auto;
}

.options.show{
  opacity:1;
  visibility:visible;

  transform:translateY(0px) scale(1);
}

.option{
  position:relative;

  padding:14px 18px;

  cursor:pointer;

  transition:.2s;

  overflow:hidden;
}

.option:hover{
  background:rgba(167,139,250,.12);
}

/* STATUS TEXT */

.version-text{
  margin-top:22px;

  text-align:center;

  font-size:1.05rem;
  font-weight:700;
}

.version-text.gray{
  color:var(--muted);
}

.version-text.green{
  color:#22c55e;
}

.version-text.red{
  color:#ef4444;
}

/* RIPPLE */

.ripple{
  position:absolute;
  border-radius:50%;
  transform:scale(0);

  background:rgba(255,255,255,.25);

  animation:ripple .65s linear;

  pointer-events:none;
}

@keyframes ripple{
  to{
    transform:scale(4);
    opacity:0;
  }
}

/* TOAST */

#copy-toast{
  position:fixed;

  left:25px;
  bottom:-120px;

  background:
  linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:#050507;

  padding:18px 24px;

  border-radius:18px;

  display:flex;
  align-items:center;
  gap:15px;

  font-weight:700;

  opacity:0;

  transition:.5s cubic-bezier(.68,-0.55,.27,1.55);

  box-shadow:
    0 20px 40px rgba(0,0,0,.45);

  z-index:9999;
}

#copy-toast.show{
  bottom:25px;
  opacity:1;
}

/* FOOTER */

footer{
  margin-top:100px;

  border-top:1px solid rgba(255,255,255,.06);

  text-align:center;

  padding:50px 25px;

  color:var(--muted);
}

/* MOBILE */

@media(max-width:768px){

  .hero-title{
    font-size:2.3rem;
  }

  .logo{
    width:300px;
  }

  .ip{
    font-size:1.4rem;
  }

  .ip-box{
    width:100%;
    min-width:unset;
  }

  .btn{
    width:100%;
  }

  .version-card{
    padding:22px;
  }

}

</style>
</head>

<body>

<div class="bg-glow"></div>
<div class="bg-glow bg-glow2"></div>

<div class="hero">

  <div class="hero-content">

    <img class="logo" src="pixelhidenet.png">

    <h1 class="hero-title">
      Version Checker
    </h1>

    <p class="hero-text">
      Prüfe ob deine Minecraft Version auf PixelHide.net unterstützt wird.
    </p>

    <div class="status">

      <div class="ip-box">

        <div class="ip">
          pixelhide.net
        </div>

        <div class="ip-small">
          Minecraft Server Adresse
        </div>

      </div>

      <button
      class="btn btn-primary"
      onclick="copyIP(this)">

        IP kopieren

      </button>

    </div>

    <!-- VERSION -->

    <div class="version-wrapper">

      <div class="version-card">

        <div class="custom-select">

          <div class="select-trigger" id="selectTrigger">

            <span id="selectedText">
              Wähle eine Version...
            </span>

            <span class="arrow">
              ▼
            </span>

          </div>

          <div class="options" id="options"></div>

        </div>

        <div id="versionStatus" class="version-text gray">
          Wähle eine Version...
        </div>

      </div>

    </div>

  </div>

</div>

<footer>

  © 2026
  <span style="color:var(--accent)">
    PixelHide.net
  </span>

</footer>

<!-- TOAST -->

<div id="copy-toast">
  Server-Adresse wurde kopiert!
</div>

<script>

/* COPY */

function copyIP(button){

  navigator.clipboard.writeText("pixelhide.net");

  let original = button.innerHTML;

  button.innerHTML = "Kopiert!";

  setTimeout(()=>{
    button.innerHTML = original;
  },2000);

  const toast = document.getElementById("copy-toast");

  toast.classList.add("show");

  setTimeout(()=>{
    toast.classList.remove("show");
  },5000);

}

/* CUSTOM DROPDOWN */

const options = document.getElementById("options");
const selectedText = document.getElementById("selectedText");
const trigger = document.getElementById("selectTrigger");
const status = document.getElementById("versionStatus");

const supportedVersions = [];

for(let major=13; major<=21; major++){

  let minorMax = (major===21) ? 11 : 9;

  for(let minor=0; minor<=minorMax; minor++){

    supportedVersions.push(`1.${major}.${minor}`);

  }

}

const allVersions = [];

for(let major=21; major>=0; major--){

  let minorMax = (major===21) ? 11 : 9;

  for(let minor=minorMax; minor>=0; minor--){

    allVersions.push(`1.${major}.${minor}`);

  }

}

allVersions.forEach(version=>{

  const option = document.createElement("div");

  option.className = "option";

  option.innerText = version;

  option.onclick = ()=>{

    selectedText.innerText = version;

    options.classList.remove("show");

    trigger.classList.remove("active");

    if(supportedVersions.includes(version)){

      status.innerText = "Diese Version ist unterstützt!";
      status.className = "version-text green";

    }else{

      status.innerText = "Diese Version ist nicht unterstützt!";
      status.className = "version-text red";

    }

  };

  options.appendChild(option);

});

/* TOGGLE */

trigger.onclick = ()=>{

  options.classList.toggle("show");

  trigger.classList.toggle("active");

};

/* CLOSE */

document.addEventListener("click",(e)=>{

  if(!e.target.closest(".custom-select")){

    options.classList.remove("show");

    trigger.classList.remove("active");

  }

});

/* RIPPLE */

document.querySelectorAll(".btn,.select-trigger,.option").forEach(btn=>{

  btn.addEventListener("click",e=>{

    const rect = btn.getBoundingClientRect();

    const ripple = document.createElement("span");

    ripple.className = "ripple";

    const size = Math.max(rect.width,rect.height);

    ripple.style.width = ripple.style.height = size + "px";

    ripple.style.left =
    (e.clientX - rect.left - size / 2) + "px";

    ripple.style.top =
    (e.clientY - rect.top - size / 2) + "px";

    btn.appendChild(ripple);

    setTimeout(()=>ripple.remove(),650);

  });

});

</script>

</body>
</html>
