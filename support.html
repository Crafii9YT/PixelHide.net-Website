<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support - PixelHide.net</title>

<link rel="icon" type="image/png" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
:root{
  --primary:#a78bfa;
  --primary-glow:#c4b5fd;
  --bg:#050507;
  --bg2:#0a0913;
  --card:#0d0d16;
  --text:#f3f4f6;
  --muted:#9ca3af;
  --border:rgba(167,139,250,.18);
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
  user-select:none;
}

html{
  scroll-behavior:smooth;
}

body{
  background:
    radial-gradient(circle at top,rgba(167,139,250,.15),transparent 35%),
    linear-gradient(180deg,#07070b,#050507);
  color:var(--text);
  font-family:'Inter',sans-serif;
  overflow-x:hidden;
}

/* BACKGROUND PARTICLES */

.particles{
  position:fixed;
  inset:0;
  overflow:hidden;
  pointer-events:none;
  z-index:-1;
}

.particle{
  position:absolute;
  width:4px;
  height:4px;
  border-radius:50%;
  background:rgba(167,139,250,.35);
  animation:float linear infinite;
}

@keyframes float{
  from{
    transform:translateY(100vh) scale(0);
    opacity:0;
  }

  10%{
    opacity:1;
  }

  to{
    transform:translateY(-10vh) scale(1.4);
    opacity:0;
  }
}

/* HERO */

.hero{
  position:relative;
  min-height:650px;
  background:
    linear-gradient(rgba(5,5,7,.45),rgba(5,5,7,.85)),
    url("Banner.png") center/cover no-repeat;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:40px 20px;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  width:700px;
  height:700px;
  background:radial-gradient(circle,rgba(167,139,250,.25),transparent 70%);
  animation:pulse 5s infinite ease-in-out;
}

@keyframes pulse{
  0%,100%{
    transform:scale(1);
    opacity:.7;
  }

  50%{
    transform:scale(1.15);
    opacity:1;
  }
}

.hero img{
  width:550px;
  max-width:90%;
  z-index:2;
  margin-bottom:25px;
  filter:
    drop-shadow(0 0 20px rgba(167,139,250,.7))
    drop-shadow(0 0 60px rgba(167,139,250,.55));
  animation:logoFloat 5s ease-in-out infinite;
}

@keyframes logoFloat{
  0%,100%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-12px);
  }
}

.banner-text{
  max-width:900px;
  line-height:1.7;
  font-size:1.15rem;
  z-index:2;
  color:#f3f4f6;
}

.cta{
  display:flex;
  gap:18px;
  flex-wrap:wrap;
  margin-top:35px;
  z-index:2;
}

.btn{
  position:relative;
  overflow:hidden;
  padding:18px 34px;
  border-radius:18px;
  text-decoration:none;
  font-weight:700;
  transition:.3s;
  display:flex;
  align-items:center;
  justify-content:center;
  gap:10px;
}

.btn::before{
  content:"";
  position:absolute;
  inset:0;
  background:
    linear-gradient(
      120deg,
      transparent 20%,
      rgba(255,255,255,.3) 50%,
      transparent 80%
    );
  transform:translateX(-120%);
  animation:shine 3.5s linear infinite;
}

@keyframes shine{
  to{
    transform:translateX(120%);
  }
}

.btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  color:#050507;
  box-shadow:0 15px 50px rgba(167,139,250,.4);
}

.btn-discord{
  background:#5865F2;
  color:white;
  box-shadow:0 15px 50px rgba(88,101,242,.4);
}

.btn:hover{
  transform:translateY(-5px) scale(1.03);
}

/* CONTENT */

section{
  max-width:1000px;
  margin:auto;
  padding:80px 20px;
}

.card{
  position:relative;
  overflow:hidden;
  background:
    linear-gradient(
      180deg,
      rgba(17,17,27,.95),
      rgba(10,10,18,.95)
    );
  border-radius:32px;
  padding:40px;
  border:1px solid var(--border);
  backdrop-filter:blur(14px);
  box-shadow:
    0 10px 40px rgba(0,0,0,.5),
    0 0 80px rgba(167,139,250,.08);
}

.card::before{
  content:"";
  position:absolute;
  inset:-1px;
  border-radius:32px;
  padding:1px;
  background:
    linear-gradient(
      135deg,
      rgba(167,139,250,.5),
      transparent,
      rgba(167,139,250,.2)
    );

  -webkit-mask:
    linear-gradient(#fff 0 0) content-box,
    linear-gradient(#fff 0 0);

  -webkit-mask-composite:xor;
  mask-composite:exclude;
}

.form-group{
  margin-bottom:24px;
}

label{
  display:block;
  margin-bottom:10px;
  font-weight:700;
}

input,
select,
textarea{
  width:100%;
  padding:16px;
  border-radius:16px;
  border:1px solid rgba(167,139,250,.15);
  background:#0a0a12;
  color:white;
  font-size:.95rem;
  transition:.25s;
  outline:none;
}

input:hover,
textarea:hover,
select:hover{
  border-color:rgba(167,139,250,.45);
}

input:focus,
textarea:focus,
select:focus{
  border-color:var(--primary);
  box-shadow:0 0 0 4px rgba(167,139,250,.15);
}

textarea{
  resize:vertical;
  min-height:140px;
}

/* SEND BUTTON */

.submit-btn{
  position:relative;
  overflow:hidden;
  width:100%;
  border:none;
  padding:20px;
  border-radius:20px;
  cursor:pointer;
  font-size:1.1rem;
  font-weight:800;
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  color:#050507;
  transition:.3s;
  box-shadow:
    0 10px 40px rgba(167,139,250,.35);
}

.submit-btn:hover{
  transform:translateY(-4px);
  box-shadow:
    0 20px 60px rgba(167,139,250,.45);
}

.submit-btn:active{
  transform:scale(.98);
}

/* POPUP */

.popup{
  position:fixed;
  inset:0;
  background:rgba(5,5,7,.8);
  backdrop-filter:blur(12px);
  display:flex;
  align-items:center;
  justify-content:center;
  opacity:0;
  pointer-events:none;
  transition:.3s;
  z-index:99999;
}

.popup.show{
  opacity:1;
  pointer-events:auto;
}

.popup-card{
  width:90%;
  max-width:520px;
  background:
    linear-gradient(
      180deg,
      rgba(20,20,30,.98),
      rgba(10,10,18,.98)
    );
  border-radius:28px;
  padding:40px;
  text-align:center;
  border:1px solid rgba(167,139,250,.2);
  box-shadow:
    0 20px 80px rgba(0,0,0,.7),
    0 0 80px rgba(239,68,68,.12);
  transform:scale(.85);
  transition:.35s cubic-bezier(.68,-0.55,.27,1.55);
}

.popup.show .popup-card{
  transform:scale(1);
}

.popup-icon{
  width:120px;
  margin-bottom:20px;
  animation:errorPulse 1.5s infinite;
}

@keyframes errorPulse{
  0%,100%{
    transform:scale(1);
  }

  50%{
    transform:scale(1.08);
  }
}

.popup-title{
  font-size:2rem;
  margin-bottom:15px;
  font-family:'Orbitron',sans-serif;
}

.popup-message{
  line-height:1.7;
  color:#d1d5db;
  margin-bottom:25px;
}

.popup-btn{
  border:none;
  padding:16px 26px;
  border-radius:16px;
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  color:#050507;
  font-weight:700;
  cursor:pointer;
  transition:.25s;
}

.popup-btn:hover{
  transform:translateY(-3px);
}

/* SHAKE */

@keyframes shake{
  0%{transform:translateX(0);}
  20%{transform:translateX(-10px);}
  40%{transform:translateX(10px);}
  60%{transform:translateX(-8px);}
  80%{transform:translateX(8px);}
  100%{transform:translateX(0);}
}

.errorShake{
  animation:shake .45s;
}

/* FOOTER */

footer{
  padding:50px 20px;
  text-align:center;
  color:var(--muted);
  border-top:1px solid rgba(167,139,250,.1);
}

/* MOBILE */

@media(max-width:768px){

  .hero{
    min-height:550px;
  }

  .hero img{
    width:280px;
  }

  .banner-text{
    font-size:1rem;
  }

  .cta{
    flex-direction:column;
    width:100%;
  }

  .btn{
    width:100%;
  }

  .card{
    padding:25px;
  }

}
</style>
</head>

<body>

<div class="particles" id="particles"></div>

<div class="hero">

  <img src="pixelhidenet.png">

  <div class="banner-text">
    Willkommen im offiziellen PixelHide.net Support.<br>
    Erstelle ganz einfach ein Ticket und unser Team hilft dir weiter.
  </div>

  <div class="cta">

    <a href="/join.html" class="btn btn-primary">
      Jetzt beitreten
    </a>

    <a href="https://discord.pixelhide.net" class="btn btn-discord">
      Discord
    </a>

  </div>

</div>

<section>

<div class="card">

<form id="supportForm">

<div class="form-group">
<label>Email-Adresse *</label>
<input type="email" required>
</div>

<div class="form-group">
<label>Kategorie *</label>

<select required>
<option>Bitte auswählen</option>
<option>Technischer Fehler</option>
<option>Spielermeldung</option>
<option>Bug melden</option>
<option>Entbannungsantrag</option>
<option>Account Problem</option>
</select>

</div>

<div class="form-group">
<label>Beschreibung *</label>
<textarea required></textarea>
</div>

<button type="submit" class="submit-btn" id="submitBtn">
  Anfrage senden
</button>

</form>

</div>

</section>

<footer>
© 2026 PixelHide.net · Nicht verbunden mit Mojang AB
</footer>

<!-- POPUP -->

<div class="popup" id="ticketPopup">

<div class="popup-card">

<img src="error.png" class="popup-icon">

<h2 class="popup-title">
Fehler!
</h2>

<p class="popup-message">
Deine Support-Anfrage konnte momentan nicht gesendet werden.<br><br>
Bitte versuche es später erneut.
</p>

<button class="popup-btn" onclick="closePopup()">
Schließen
</button>

</div>

</div>

<script>
/* PARTICLES */

const particles = document.getElementById("particles");

for(let i=0;i<50;i++){

  const p = document.createElement("div");
  p.className = "particle";

  p.style.left = Math.random()*100+"vw";
  p.style.animationDuration = 6 + Math.random()*10 + "s";
  p.style.animationDelay = Math.random()*5+"s";

  particles.appendChild(p);
}

/* POPUP */

function openPopup(){
  document.getElementById("ticketPopup").classList.add("show");
}

function closePopup(){
  document.getElementById("ticketPopup").classList.remove("show");
}

/* ALWAYS ERROR */

document.getElementById("supportForm").addEventListener("submit",function(e){

  e.preventDefault();

  const btn = document.getElementById("submitBtn");
  const card = document.querySelector(".card");

  btn.innerText = "Sende Anfrage...";
  btn.disabled = true;

  setTimeout(()=>{

    openPopup();

    card.classList.add("errorShake");

    setTimeout(()=>{
      card.classList.remove("errorShake");
    },500);

    btn.disabled = false;
    btn.innerText = "Anfrage senden";

  },2200);

});
</script>

</body>
</html>
