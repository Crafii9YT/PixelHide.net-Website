<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>Support nicht verfügbar | PixelHide.net</title>

<meta property="og:title" content="PixelHide.net">
<meta property="og:description" content="Diese Seite ist aktuell nicht verfügbar.">
<meta property="og:image" content="https://pixelhide.net/favicon.png">

<link rel="icon" href="https://pixelhide.net/favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{
  --bg:#040406;
  --card:#0d0d14;
  --card2:#13131d;

  --accent:#a78bfa;
  --accent2:#c4b5fd;

  --discord:#5865F2;

  --text:#f5f5f5;
  --muted:#9ca3af;
}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{
  font-family:Inter,sans-serif;
  background:var(--bg);
  color:var(--text);
  overflow:hidden;
}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#08080d;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--accent),var(--accent2));
  border-radius:999px;
}

/* BACKGROUND GLOW */

.bg-glow{
  position:fixed;
  width:700px;
  height:700px;
  background:radial-gradient(circle,var(--accent) 0%,transparent 70%);
  opacity:.12;
  filter:blur(100px);
  z-index:-1;
  animation:floatGlow 12s ease-in-out infinite;
}

.bg-glow2{
  right:-250px;
  top:300px;
  animation-delay:4s;
}

@keyframes floatGlow{
  0%{transform:translateY(0px) translateX(0px);}
  50%{transform:translateY(-50px) translateX(40px);}
  100%{transform:translateY(0px) translateX(0px);}
}

/* HERO */

.hero{
  position:relative;
  min-height:100vh;
  background:
    linear-gradient(rgba(0,0,0,.55),rgba(4,4,6,.97)),
    url("https://pixelhide.net/Banner.png") center/cover no-repeat;

  display:flex;
  justify-content:center;
  align-items:center;
  text-align:center;
  overflow:hidden;
}

.hero::before{
  content:"";
  position:absolute;
  inset:0;
  background:
  radial-gradient(circle at center,
  rgba(167,139,250,.18),
  transparent 60%);
  animation:pulse 6s infinite;
}

@keyframes pulse{
  0%{opacity:.4;transform:scale(1);}
  50%{opacity:.8;transform:scale(1.08);}
  100%{opacity:.4;transform:scale(1);}
}

.hero-content{
  position:relative;
  z-index:2;
  width:100%;
  max-width:900px;
  padding:30px;
  animation:heroEnter 1.2s ease;
}

@keyframes heroEnter{
  from{
    opacity:0;
    transform:translateY(50px);
  }
  to{
    opacity:1;
    transform:translateY(0);
  }
}

.logo{
  width:520px;
  max-width:95%;
  margin-bottom:30px;

  filter:
    drop-shadow(0 0 20px rgba(167,139,250,.6))
    drop-shadow(0 0 80px rgba(167,139,250,.45));

  animation:floatLogo 5s ease-in-out infinite;
}

@keyframes floatLogo{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-10px);}
  100%{transform:translateY(0px);}
}

/* ERROR CARD */

.error-card{
  position:relative;

  background:
  linear-gradient(
    145deg,
    rgba(255,255,255,.05),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.08);

  border-radius:32px;

  padding:50px;

  overflow:hidden;

  backdrop-filter:blur(18px);

  box-shadow:
    0 20px 60px rgba(0,0,0,.6),
    0 0 60px rgba(167,139,250,.08);
}

.error-card::before{
  content:"";
  position:absolute;
  inset:0;

  background:
  radial-gradient(circle at top left,
  rgba(167,139,250,.22),
  transparent 55%);

  opacity:.9;
}

.error-content{
  position:relative;
  z-index:2;
}

.error-icon{
  width:180px;
  margin-bottom:25px;

  filter:
    drop-shadow(0 0 25px rgba(239,68,68,.45))
    drop-shadow(0 0 80px rgba(239,68,68,.2));

  animation:errorFloat 4s ease-in-out infinite;
}

@keyframes errorFloat{
  0%{transform:translateY(0px);}
  50%{transform:translateY(-12px);}
  100%{transform:translateY(0px);}
}

.error-title{
  font-size:3.4rem;
  font-family:Orbitron,sans-serif;
  margin-bottom:18px;
}

.error-text{
  font-size:1.15rem;
  color:var(--muted);
  max-width:650px;
  margin:auto;
  line-height:1.8;
}

/* BUTTONS */

.btn-row{
  display:flex;
  justify-content:center;
  gap:18px;
  flex-wrap:wrap;
  margin-top:40px;
}

.btn{
  position:relative;

  padding:17px 32px;
  border-radius:16px;

  display:flex;
  align-items:center;
  justify-content:center;
  gap:12px;

  text-decoration:none;
  font-weight:700;

  overflow:hidden;

  transition:.25s;

  backdrop-filter:blur(10px);
}

.btn::before{
  content:"";
  position:absolute;
  top:0;
  left:-120%;
  width:100%;
  height:100%;

  background:linear-gradient(
    90deg,
    transparent,
    rgba(255,255,255,.25),
    transparent
  );

  transition:.6s;
}

.btn:hover::before{
  left:120%;
}

.btn:hover{
  transform:translateY(-4px) scale(1.03);
}

.btn-primary{
  background:linear-gradient(135deg,var(--accent),var(--accent2));
  color:#050507;

  box-shadow:
    0 0 20px rgba(167,139,250,.35),
    0 0 60px rgba(167,139,250,.2);
}

.btn-discord{
  background:rgba(88,101,242,.15);
  border:1px solid rgba(88,101,242,.4);
  color:white;

  box-shadow:
    0 0 25px rgba(88,101,242,.2);
}

.btn img{
  width:22px;
  height:22px;
}

/* FOOTER */

footer{
  position:absolute;
  bottom:0;
  width:100%;

  border-top:1px solid rgba(255,255,255,.06);

  padding:28px 25px;

  text-align:center;
  background:rgba(0,0,0,.25);
  backdrop-filter:blur(12px);
}

footer .links{
  margin-bottom:12px;
}

footer a{
  color:var(--accent);
  text-decoration:none;
  margin:0 12px;
  transition:.2s;
}

footer a:hover{
  color:white;
}

footer span{
  color:var(--accent);
}

/* MOBILE */

@media(max-width:768px){

  .logo{
    width:300px;
  }

  .error-card{
    padding:35px 25px;
    border-radius:24px;
  }

  .error-icon{
    width:130px;
  }

  .error-title{
    font-size:2.1rem;
  }

  .error-text{
    font-size:1rem;
  }

  footer{
    position:relative;
  }

}

</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow bg-glow2"></div>

<div class="hero">

  <div class="hero-content">

    <img class="logo" src="https://pixelhide.net/pixelhidenet.png">

    <div class="error-card">

      <div class="error-content">

        <img class="error-icon" src="https://pixelhide.net/error.png">

        <h1 class="error-title">
          Diese Seite ist nicht verfügbar
        </h1>

        <p class="error-text">
          Der PixelHide Support ist aktuell nicht erreichbar oder wurde vorübergehend deaktiviert.
          Bitte versuche es später erneut oder nutze unseren Discord Server.
        </p>

        <div class="btn-row">

          <a href="/join.html" class="btn btn-primary">
            Jetzt beitreten
          </a>

          <a href="https://discord.pixelhide.net" class="btn btn-discord">

            <img src="https://pixelhide.net/assets/icons/discord.png">

            Discord

          </a>

        </div>

      </div>

    </div>

  </div>

</div>

<footer>
  <div>
    © 2026 <span style="color:var(--accent)">PixelHide.net</span>
  </div>
</footer>

</body>
</html>
