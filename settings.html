<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PixelHide Settings</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{

  --bg:#050507;
  --card:#101018;
  --card2:#161621;

  --accent:#a78bfa;
  --accent2:#c4b5fd;

  --text:#f5f5f5;
  --muted:#9ca3af;

  --radius:24px;

  --zoom:1;
  --text-size:1;
  --blur:16px;

}

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

html{
  scroll-behavior:smooth;
}

body{

  font-family:Inter,sans-serif;

  background:var(--bg);
  color:var(--text);

  overflow-x:hidden;

  transform:scale(var(--zoom));
  transform-origin:top center;

  font-size:calc(16px * var(--text-size));

  transition:
  background .25s,
  color .25s;

}

/* SCROLLBAR */

::-webkit-scrollbar{
  width:10px;
}

::-webkit-scrollbar-track{
  background:#09090f;
}

::-webkit-scrollbar-thumb{
  background:linear-gradient(var(--accent),var(--accent2));
  border-radius:999px;
}

/* BACKGROUND */

.bg-glow{
  position:fixed;
  width:700px;
  height:700px;

  background:
  radial-gradient(circle,var(--accent) 0%,transparent 70%);

  opacity:.12;

  filter:blur(100px);

  z-index:-1;

  animation:floatGlow 12s ease-in-out infinite;
}

.bg-glow2{
  right:-200px;
  top:300px;
}

@keyframes floatGlow{

  0%{
    transform:translateY(0px);
  }

  50%{
    transform:translateY(-50px);
  }

  100%{
    transform:translateY(0px);
  }

}

/* HERO */

.hero{

  min-height:45vh;

  display:flex;
  justify-content:center;
  align-items:center;

  text-align:center;

  padding:80px 20px;

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(rgba(0,0,0,.45),rgba(5,5,7,.95)),
  url("Banner.png") center/cover no-repeat;

}

.hero::before{

  content:"";

  position:absolute;
  inset:0;

  background:
  radial-gradient(circle at center,
  rgba(167,139,250,.25),
  transparent 60%);

  animation:pulse 6s infinite;

}

@keyframes pulse{

  0%{
    opacity:.4;
    transform:scale(1);
  }

  50%{
    opacity:.8;
    transform:scale(1.06);
  }

  100%{
    opacity:.4;
    transform:scale(1);
  }

}

.hero-content{
  position:relative;
  z-index:2;
}

.logo{

  width:500px;
  max-width:90%;

  margin-bottom:25px;

  filter:
    drop-shadow(0 0 25px rgba(167,139,250,.5))
    drop-shadow(0 0 80px rgba(167,139,250,.4));

}

.hero-title{

  font-family:Orbitron;
  font-size:4rem;

  margin-bottom:15px;

}

.hero-text{

  color:var(--muted);

  max-width:700px;
  margin:auto;

  line-height:1.8;

}

/* SETTINGS */

.settings-wrapper{

  max-width:1400px;
  margin:auto;

  padding:80px 25px;

  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(320px,1fr));

  gap:28px;

}

.settings-card{

  position:relative;

  overflow:hidden;

  background:
  linear-gradient(
    145deg,
    rgba(255,255,255,.05),
    rgba(255,255,255,.02)
  );

  border:1px solid rgba(255,255,255,.06);

  border-radius:var(--radius);

  padding:28px;

  backdrop-filter:blur(var(--blur));

  transition:.25s;

}

.settings-card:hover{

  transform:translateY(-6px);

  border-color:
  rgba(167,139,250,.35);

}

.settings-card h2{

  font-family:Orbitron;
  margin-bottom:22px;

  font-size:1.5rem;

}

.setting{

  margin-bottom:28px;

}

.setting label{

  display:flex;
  justify-content:space-between;

  margin-bottom:12px;

  color:var(--muted);

}

/* INPUTS */

.slider{

  width:100%;
  appearance:none;

  height:10px;

  border-radius:999px;

  background:
  linear-gradient(
    90deg,
    var(--accent),
    var(--accent2)
  );

  outline:none;

}

.slider::-webkit-slider-thumb{

  appearance:none;

  width:24px;
  height:24px;

  border-radius:50%;

  background:white;

  cursor:pointer;

  box-shadow:
    0 0 20px rgba(167,139,250,.5);

}

.theme-grid{

  display:grid;
  grid-template-columns:repeat(3,1fr);

  gap:15px;

}

.theme{

  height:80px;

  border-radius:18px;

  cursor:pointer;

  position:relative;

  overflow:hidden;

  border:2px solid transparent;

  transition:.25s;

}

.theme:hover{
  transform:scale(1.04);
}

.theme.active{
  border-color:white;
}

.theme-purple{
  background:linear-gradient(135deg,#8b5cf6,#c4b5fd);
}

.theme-blue{
  background:linear-gradient(135deg,#3b82f6,#60a5fa);
}

.theme-green{
  background:linear-gradient(135deg,#22c55e,#86efac);
}

.theme-red{
  background:linear-gradient(135deg,#ef4444,#fca5a5);
}

.theme-orange{
  background:linear-gradient(135deg,#f97316,#fdba74);
}

.theme-pink{
  background:linear-gradient(135deg,#ec4899,#f9a8d4);
}

/* TOGGLES */

.toggle{

  width:65px;
  height:36px;

  border-radius:999px;

  background:#23232f;

  position:relative;

  cursor:pointer;

  transition:.25s;

}

.toggle::before{

  content:"";

  position:absolute;

  width:28px;
  height:28px;

  border-radius:50%;

  background:white;

  top:4px;
  left:4px;

  transition:.25s;

}

.toggle.active{

  background:
  linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

}

.toggle.active::before{
  left:33px;
}

/* BUTTON */

.btn{

  position:relative;

  overflow:hidden;

  border:none;

  padding:16px 24px;

  border-radius:18px;

  font-weight:700;

  cursor:pointer;

  background:
  linear-gradient(
    135deg,
    var(--accent),
    var(--accent2)
  );

  color:#050507;

  transition:.25s;

}

.btn:hover{

  transform:translateY(-4px) scale(1.03);

  box-shadow:
    0 0 25px rgba(167,139,250,.25);

}

/* RIPPLE */

.ripple{

  position:absolute;

  border-radius:50%;

  transform:scale(0);

  background:rgba(255,255,255,.35);

  animation:ripple .65s linear;

}

@keyframes ripple{

  to{
    transform:scale(4);
    opacity:0;
  }

}

/* FOOTER */

footer{

  margin-top:80px;

  padding:40px 20px;

  text-align:center;

  border-top:1px solid rgba(255,255,255,.06);

  color:var(--muted);

}

/* MOBILE */

@media(max-width:768px){

  .hero-title{
    font-size:2.4rem;
  }

  .theme-grid{
    grid-template-columns:repeat(2,1fr);
  }

}

</style>
</head>
<body>

<div class="bg-glow"></div>
<div class="bg-glow bg-glow2"></div>

<!-- HERO -->

<section class="hero">

  <div class="hero-content">

    <img src="pixelhidenet.png" class="logo">

    <h1 class="hero-title">
      Settings
    </h1>

    <p class="hero-text">
      Passe PixelHide komplett an deinen Stil an.
      Farben, Zoom, Blur, Animationen, Textgröße und vieles mehr.
    </p>

  </div>

</section>

<!-- SETTINGS -->

<div class="settings-wrapper">

  <!-- APPEARANCE -->

  <div class="settings-card">

    <h2>Appearance</h2>

    <div class="setting">

      <label>
        <span>Zoom</span>
        <span id="zoom-value">100%</span>
      </label>

      <input
      type="range"
      min="0.7"
      max="1.4"
      step="0.01"
      value="1"
      class="slider"
      id="zoom-slider">

    </div>

    <div class="setting">

      <label>
        <span>Text Size</span>
        <span id="text-value">100%</span>
      </label>

      <input
      type="range"
      min="0.8"
      max="1.6"
      step="0.01"
      value="1"
      class="slider"
      id="text-slider">

    </div>

    <div class="setting">

      <label>
        <span>Blur Strength</span>
        <span id="blur-value">16px</span>
      </label>

      <input
      type="range"
      min="0"
      max="40"
      value="16"
      class="slider"
      id="blur-slider">

    </div>

  </div>

  <!-- THEMES -->

  <div class="settings-card">

    <h2>Themes</h2>

    <div class="theme-grid">

      <div class="theme theme-purple active"
      onclick="setTheme('#a78bfa','#c4b5fd',this)">
      </div>

      <div class="theme theme-blue"
      onclick="setTheme('#3b82f6','#60a5fa',this)">
      </div>

      <div class="theme theme-green"
      onclick="setTheme('#22c55e','#86efac',this)">
      </div>

      <div class="theme theme-red"
      onclick="setTheme('#ef4444','#fca5a5',this)">
      </div>

      <div class="theme theme-orange"
      onclick="setTheme('#f97316','#fdba74',this)">
      </div>

      <div class="theme theme-pink"
      onclick="setTheme('#ec4899','#f9a8d4',this)">
      </div>

    </div>

  </div>

  <!-- EXTRA -->

  <div class="settings-card">

    <h2>Extra Settings</h2>

    <div class="setting">

      <label>
        <span>Animations</span>
      </label>

      <div class="toggle active"></div>

    </div>

    <div class="setting">

      <label>
        <span>Particles</span>
      </label>

      <div class="toggle active"></div>

    </div>

    <div class="setting">

      <label>
        <span>Glow Effects</span>
      </label>

      <div class="toggle active"></div>

    </div>

    <div class="setting">

      <label>
        <span>Rounded UI</span>
      </label>

      <div class="toggle active"></div>

    </div>

    <button class="btn">
      Save Settings
    </button>

  </div>

</div>

<footer>

  © 2026
  <span style="color:var(--accent)">
    PixelHide Settings
  </span>

</footer>

<script>

/* ZOOM */

const zoomSlider =
document.getElementById("zoom-slider");

const zoomValue =
document.getElementById("zoom-value");

zoomSlider.oninput = ()=>{

  document.documentElement.style
  .setProperty("--zoom",zoomSlider.value);

  zoomValue.innerHTML =
  Math.floor(zoomSlider.value * 100) + "%";

};

/* TEXT SIZE */

const textSlider =
document.getElementById("text-slider");

const textValue =
document.getElementById("text-value");

textSlider.oninput = ()=>{

  document.documentElement.style
  .setProperty("--text-size",textSlider.value);

  textValue.innerHTML =
  Math.floor(textSlider.value * 100) + "%";

};

/* BLUR */

const blurSlider =
document.getElementById("blur-slider");

const blurValue =
document.getElementById("blur-value");

blurSlider.oninput = ()=>{

  document.documentElement.style
  .setProperty("--blur",
  blurSlider.value + "px");

  blurValue.innerHTML =
  blurSlider.value + "px";

};

/* THEMES */

function setTheme(a,b,element){

  document.documentElement.style
  .setProperty("--accent",a);

  document.documentElement.style
  .setProperty("--accent2",b);

  document.querySelectorAll(".theme")
  .forEach(t=>t.classList.remove("active"));

  element.classList.add("active");

}

/* TOGGLES */

document.querySelectorAll(".toggle")
.forEach(toggle=>{

  toggle.addEventListener("click",()=>{

    toggle.classList.toggle("active");

  });

});

/* RIPPLE */

document.querySelectorAll(".btn")
.forEach(btn=>{

  btn.addEventListener("click",e=>{

    const rect = btn.getBoundingClientRect();

    const ripple =
    document.createElement("span");

    ripple.className = "ripple";

    const size =
    Math.max(rect.width,rect.height);

    ripple.style.width =
    ripple.style.height =
    size + "px";

    ripple.style.left =
    (e.clientX - rect.left - size/2)
    + "px";

    ripple.style.top =
    (e.clientY - rect.top - size/2)
    + "px";

    btn.appendChild(ripple);

    setTimeout(()=>{
      ripple.remove();
    },650);

  });

});

</script>

</body>
</html>
