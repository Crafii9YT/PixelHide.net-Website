<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<title>PixelHide</title>

<link rel="icon" href="favicon.png">

<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@500;700;900&family=Inter:wght@300;400;500;700&display=swap" rel="stylesheet">

<style>

:root{

  --bg:#050507;
  --bg2:#0b0b10;

  --accent:#a78bfa;
  --accent2:#c4b5fd;

  --text:#f5f5f5;
  --muted:#9ca3af;

  --radius:24px;

  --zoom:1;
  --text-size:1;
  --blur:16px;

  --card-opacity:.06;
  --glow-opacity:.12;

  --transition:.25s;

}

/* GLOBAL */

*{
  margin:0;
  padding:0;
  box-sizing:border-box;
}

body{

  font-family:Inter,sans-serif;

  background:
  linear-gradient(180deg,var(--bg),var(--bg2));

  color:var(--text);

  transform:scale(var(--zoom));
  transform-origin:top center;

  font-size:calc(16px * var(--text-size));

  transition:background .25s,color .25s;

  overflow-x:hidden;

}

/* SETTINGS BUTTON */

.settings-btn{

  position:fixed;
  top:20px;
  right:20px;

  padding:14px 18px;

  border-radius:16px;

  background:rgba(255,255,255,.06);

  border:1px solid rgba(255,255,255,.08);

  backdrop-filter:blur(16px);

  color:var(--text);

  text-decoration:none;

  font-weight:700;

  z-index:9999;

  transition:.2s;

}

.settings-btn:hover{
  transform:translateY(-3px);
  border-color:rgba(167,139,250,.4);
}

/* HERO */

.hero{

  min-height:100vh;

  display:flex;
  align-items:center;
  justify-content:center;

  text-align:center;

  background:
  linear-gradient(rgba(0,0,0,.5),rgba(0,0,0,.9)),
  url("Banner.png") center/cover;

}

.hero h1{

  font-family:Orbitron;
  font-size:4rem;

}

.hero p{

  margin-top:20px;
  color:var(--muted);

  max-width:700px;

}

/* SIMPLE CARD */

.card{

  max-width:900px;
  margin:auto;

  padding:40px;

  margin-top:60px;

  border-radius:var(--radius);

  background:
  rgba(255,255,255,var(--card-opacity));

  backdrop-filter:blur(var(--blur));

  border:1px solid rgba(255,255,255,.08);

  transition:var(--transition);

}

/* ANIMATION DISABLE */

.no-animations *{
  animation:none !important;
  transition:none !important;
}

</style>
</head>

<body>

<a class="settings-btn" href="settings.html">
⚙ Settings
</a>

<div class="hero">

  <div>

    <h1>PixelHide</h1>

    <p>
      Deine Settings werden automatisch geladen (Theme, Zoom, Textgröße, Blur, Toggles).
    </p>

    <div class="card">

      <h2>Live Settings Preview</h2>

      <p style="color:var(--muted);margin-top:10px;">
        Diese Box reagiert direkt auf deine Settings.
      </p>

    </div>

  </div>

</div>

<script>

/* LOAD */

function load(k,d){
  return localStorage.getItem(k) || d;
}

/* APPLY SETTINGS */

function apply(){

  const theme = load("theme","dark");

  const themes = {

    dark:{bg:"#050507",bg2:"#0b0b10"},
    light:{bg:"#ffffff",bg2:"#f4f4f5"},
    oled:{bg:"#000000",bg2:"#000000"},
    nebula:{bg:"#12051f",bg2:"#1e1033"},
    blue:{bg:"#07111f",bg2:"#0f172a"},
    green:{bg:"#07130b",bg2:"#0f1f14"},
    red:{bg:"#160606",bg2:"#2a0b0b"},
    orange:{bg:"#1a0d05",bg2:"#2e1607"},
    pink:{bg:"#1f0717",bg2:"#3b102c"},
    cyan:{bg:"#05161b",bg2:"#082f49"},
    gold:{bg:"#1b1405",bg2:"#2d2209"},
    forest:{bg:"#03120a",bg2:"#052e16"},
    blood:{bg:"#0f0000",bg2:"#220000"},
    midnight:{bg:"#020617",bg2:"#0f172a"},
    candy:{bg:"#2a1023",bg2:"#4a1d3f"}

  };

  if(themes[theme]){

    document.documentElement.style.setProperty("--bg",themes[theme].bg);
    document.documentElement.style.setProperty("--bg2",themes[theme].bg2);

  }

  const zoom = load("zoom","1");
  const text = load("textSize","1");
  const blur = load("blur","16");

  document.documentElement.style.setProperty("--zoom",zoom);
  document.documentElement.style.setProperty("--text-size",text);
  document.documentElement.style.setProperty("--blur",blur+"px");

  const animations = load("animations","true") === "true";

  if(!animations){
    document.body.classList.add("no-animations");
  }

  const glow = load("glow","true") === "true";
  document.documentElement.style.setProperty("--glow-opacity", glow ? ".12" : "0");

  const rounded = load("rounded","true") === "true";
  document.documentElement.style.setProperty("--radius", rounded ? "24px" : "0px");

  const transparent = load("transparent","true") === "true";
  document.documentElement.style.setProperty("--card-opacity", transparent ? ".06" : ".2");

  const transitions = load("transitions","true") === "true";
  document.documentElement.style.setProperty("--transition", transitions ? ".25s" : "0s");

}

/* RUN */

apply();

</script>

</body>
</html>
