<!DOCTYPE html>
<html lang="de">
<head>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<meta property="og:title" content="PixelHide.net">
<meta property="og:description" content="PixelHide.net Netzwerk: Das Team hinter dem Netzwerk!">
<meta property="og:image" content="https://pixelhide.net/favicon.png">
<meta property="og:url" content="https://pixelhide.net">

<title>PixelHide.net</title>

<link rel="icon" type="image/png" href="https://pixelhide.net/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">
<link rel="manifest" href="https://pixelhide.net/manifest.json">

<style>
:root{
  --primary:#a78bfa;
  --primary-glow:#c4b5fd;
  --secondary:#050507;
  --card:#0b0b12;
  --text:#e5e7eb;
  --muted:#9ca3af;
  --owner:#8b0000;
  --admin:#ff4c4c;
  --moderator:#ff6666;
  --supporter:#facc15;
  --builder:#22c55e;
}

*{
  box-sizing:border-box;
  user-select:none !important;
  margin:0;
  padding:0;
}

body{
  font-family:'Inter',sans-serif;
  background:var(--secondary);
  color:var(--text);
  overflow-x:hidden;
}

.hero{
  position:relative;
  height:500px;
  background:url("https://pixelhide.net/Banner.png") center/cover no-repeat;
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
  text-align:center;
  padding:20px;
}

.hero img{
  width:600px;
  max-width:90%;
  z-index:2;
  filter:drop-shadow(0 0 70px rgba(167,139,250,0.9));
  margin-bottom:20px;
}

.hero .cta{
  display:flex;
  gap:16px;
  justify-content:center;
  z-index:2;
  flex-wrap:wrap;
}

.hero .btn{
  padding:18px 32px;
  font-size:1.1rem;
  border-radius:14px;
  font-weight:600;
  text-decoration:none;
  transition:.25s;
  display:inline-block;
  text-align:center;
}

.hero .btn-primary{
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  color:#050507;
}

.hero .btn-outline{
  border:1px solid rgba(167,139,250,0.4);
  color:#e5e7eb;
  background:none;
}

section{
  padding:60px 20px;
  max-width:1200px;
  margin:auto;
}

.grid{
  display:grid;
  grid-template-columns:repeat(auto-fit,minmax(250px,1fr));
  gap:12px 12px;
}

.card{
  background:var(--card);
  border-radius:18px;
  padding:20px;
  border:1px solid rgba(167,139,250,0.15);
  transition:.3s;
  display:flex;
  flex-direction:column;
  align-items:center;
  text-align:center;
}

.card:hover{
  transform:translateY(-4px);
  box-shadow:0 0 20px rgba(167,139,250,0.4);
}

.card img{
  width:80px;
  height:80px;
  border-radius:50%;
  margin-bottom:12px;
  object-fit:cover;
  border:2px solid var(--primary-glow);
}

.card h3{
  font-family:'Orbitron',sans-serif;
  color:#ddd6fe;
  margin-bottom:6px;
  font-size:1.1rem;
}

.rank{
  font-weight:600;
  margin-left:6px;
  font-size:0.95rem;
}

.copy-btn{
  padding:10px 20px;
  font-size:0.9rem;
  border-radius:10px;
  border:none;
  cursor:pointer;
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  color:#050507;
  transition:.3s;
}

.copy-btn:hover{
  transform:translateY(-2px);
}

.double-cards{
  display:flex;
  gap:20px;
  justify-content:center;
  flex-wrap:wrap;
  margin-top:30px;
}

h1 .count{
  opacity:0.7;
  font-size:0.8em;
  margin-left:10px;
}

footer{
  text-align:center;
  padding:40px;
  border-top:1px solid rgba(167,139,250,0.15);
  color:var(--muted);
  font-size:0.9rem;
}
footer span{
  color:var(--primary);
}
</style>

</head>

<body>

<div class="hero">
  <img src="https://pixelhide.net/pixelhidenet.png">
  <div class="cta">
    <a href="/join.html" class="btn btn-primary">Jetzt beitreten</a>
    <a href="https://discord.pixelhide.net" class="btn btn-outline">Discord</a>
  </div>
</div>

<section>
<h1 style="color:var(--owner)">Owner</h1>
<div class="grid">
  <div class="card"></div>
  <div class="card"></div>
</div>
</section>

<section>
<h1 style="color:var(--admin)">Administratoren</h1>
<div class="grid">
  <div class="card"></div>
</div>
</section>

<section>
<h1 style="color:var(--moderator)">Moderatoren</h1>
<div class="grid">
  <div class="card"></div>
  <div class="card"></div>
</div>
</section>

<section>
<h1 style="color:var(--supporter)">Supporter</h1>
<div class="grid">
  <div class="card"></div>
</div>
</section>

<section>
<h1 style="color:#3b82f6">Test-Teammitglieder</h1>
<div class="grid">
  <div class="card"></div>
  <div class="card"></div>
  <div class="card"></div>
</div>
</section>

<section>
<h1 style="color:var(--builder)">Builder</h1>
<div class="grid">
  <div class="card"></div>
</div>
</section>

<section>
<h1 style="color:#A855F7">Unterstützer</h1>
<div class="grid">
  <div class="card"></div>
</div>
</section>

<section class="double-cards">
  <div class="card">
    <h3>Gehöre mit zum Team!</h3>
    <p>Bewerbe dich im Team.</p>
    <a href="/bewerben.html" class="copy-btn">Bewerben</a>
  </div>

  <div class="card">
    <h3>Du benötigst Hilfe?</h3>
    <p>Kontaktiere unseren Support!</p>
    <a href="/support.html" class="copy-btn">Support kontaktieren</a>
  </div>
</section>

<footer>
  <div>
    © 2026 <span>PixelHide.net</span>
  </div>
</footer>

<script>
document.querySelectorAll("section").forEach(section => {
  const grid = section.querySelector(".grid");
  const title = section.querySelector("h1");
  if(grid && title){
    const count = grid.querySelectorAll(".card").length;
    const span = document.createElement("span");
    span.className = "count";
    span.textContent = "(" + count + ")";
    title.appendChild(span);
  }
});
</script>

</body>
</html>
