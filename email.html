<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<title>PixelHide.net</title>
<link rel="icon" type="image/png" href="https://pixelhide.net/favicon.png">
<link href="https://fonts.googleapis.com/css2?family=Orbitron:wght@400;600;800&family=Inter:wght@300;400;600&display=swap" rel="stylesheet">

<style>
:root {
  --primary:#a78bfa;
  --primary-glow:#c4b5fd;
  --secondary:#050507;
  --text:#e5e7eb;
}

*{box-sizing:border-box;}

body {
  margin:0;
  font-family:'Inter',sans-serif;
  background:#050507;
  color:var(--text);
  display:flex;
  align-items:center;
  justify-content:center;
  height:100vh;
  text-align:center;
  overflow:hidden;
}

.hero {
  display:flex;
  flex-direction:column;
  align-items:center;
  justify-content:center;
}

.hero img {
  width:300px;
  max-width:80%;
  margin-bottom:20px;
  filter:drop-shadow(0 0 50px rgba(167,139,250,0.9));
}

h1 {
  font-family:'Orbitron',sans-serif;
  font-size:5rem;
  margin:0 0 10px 0;
  color:var(--primary);
}

p {
  font-size:1.2rem;
  margin:0 0 20px 0;
}

.btn {
  padding:14px 28px;
  font-size:1rem;
  border-radius:12px;
  font-weight:600;
  text-decoration:none;
  color:#050507;
  background:linear-gradient(135deg,var(--primary),var(--primary-glow));
  box-shadow:0 10px 30px rgba(167,139,250,0.45);
  transition:all .25s ease;
  cursor:pointer;
  display:inline-block;
}

.btn:hover {
  transform:translateY(-2px) scale(1.03);
  box-shadow:0 18px 50px rgba(167,139,250,0.6);
}

footer {
  position:absolute;
  bottom:20px;
  width:100%;
  text-align:center;
  font-size:0.85rem;
  color:var(--text);
}
</style>
</head>

<body>

<div class="hero">
  <img src="https://pixelhide.net/pixelhidenet.png" alt="PixelHide.net Logo">

  <h1>Kontakt</h1>
  <p>Du wirst weitergeleitet...</p>

  <!-- Fallback Button -->
  <a class="btn"
     href="mailto:pixelhide.net@gmail.com">
     Email senden
  </a>
</div>

<footer>© 2026 PixelHide.net</footer>

<!-- AUTO MAIL TRIGGER -->
<script>
window.onload = function () {
  setTimeout(() => {
    window.location.href =
      "mailto:pixelhide.net@gmail.com?subject=Kontakt%20PixelHide&body=Hallo%20PixelHide%20Team%2C";
  }, 500);
};
</script>

</body>
</html>
